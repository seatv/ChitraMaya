name: Feature request
description: Suggest an improvement or new capability for ChitraMaya.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Content policy — read before posting

        **Do not attach, embed, paste, or link any NSFW or sexually explicit
        images, video, or frames** anywhere in this issue. Posts or threads
        containing explicit content **will be removed**.

        Describe your idea in words. If you need to show a UI mockup, keep it to
        **non-explicit** interface elements only.
  - type: checkboxes
    id: content-ack
    attributes:
      label: Content acknowledgement
      options:
        - label: This request contains **no NSFW / explicit content**.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: "It's hard to ... because ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: "It would help if ChitraMaya could ..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      validations:
        required: false
