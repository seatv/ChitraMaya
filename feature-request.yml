name: Feature request
description: Suggest a new feature, capability, or improvement for ChitraMaya.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest something.  The more context you
        give about the problem you're trying to solve, the better.

        **Content policy — please read:**
        Do **not** attach, embed, paste, or link any NSFW or sexually explicit
        images, video, or frames anywhere in this issue.  Issues or threads
        containing explicit content **will be removed**.  Describe your idea in
        words; if you need a mockup, use non-explicit UI elements only.

  - type: checkboxes
    id: content-ack
    attributes:
      label: Acknowledgement
      options:
        - label: This request contains **no NSFW / explicit content**.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not just the proposed solution.
      placeholder: |
        e.g. "On SBS VR clips I re-check the same frame repeatedly, and ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like ChitraMaya to do?
      description: Your proposed feature or behavior.
      placeholder: |
        e.g. "Add a live GPU-utilization readout during engine compilation."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've tried to solve this, or related features that exist today.

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Use cases, references, non-explicit mockups.
